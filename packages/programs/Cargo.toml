[workspace]
members = [
    "programs/veil-registry",
    "programs/veil-session",
    "programs/veil-pool",
    "programs/veil-verifier",
]
resolver = "2"

[workspace.dependencies]
anchor-lang = "0.30.1"
solana-program = "1.18.26"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1
